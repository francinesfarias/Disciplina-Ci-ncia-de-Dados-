name: AI Agent (Aider)

on:
  issues:
    types: [labeled]

jobs:
  aider-fix:
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # O Aider precisa do histórico completo

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configurar Git (Obrigatório para o Aider)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory /github/workspace

      - name: Instalar Aider e Dependências
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Executar Agente (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Adicionamos a flag --no-git para evitar conflitos de commit dentro do container
          # E garantimos o modelo correto do Gemini
          aider --model gemini/gemini-1.5-flash \
                --message "Resolva esta issue: ${{ github.event.issue.title }} - ${{ github.event.issue.body }}" \
                --yes \
                --no-git \
                --no-auto-commits
          
      - name: Criar Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "AI: Resolução automática da issue #${{ github.event.issue.number }}"
          title: "🤖 Fix: ${{ github.event.issue.title }}"
          body: "Este PR foi gerado pela IA Gemini."
          branch: "ai-fix-${{ github.event.issue.number }}"
